# Supabase CLI configuration
# Local dev: `supabase start`
# Link to remote: `supabase link --project-ref <ref>`
# Push migrations: `supabase db push`  (or: npm run db:push)

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/reset-password"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
